<svg width="180" height="180" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Vibrant blue-violet-pink gradient -->
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6" />   <!-- Blue -->
      <stop offset="50%" stop-color="#8b5cf6" />  <!-- Violet -->
      <stop offset="100%" stop-color="#ec4899" /> <!-- Pink -->
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%" filterUnits="userSpaceOnUse">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Dark background container -->
  <rect width="100" height="100" rx="24" fill="#09090b" />
  
  <!-- Subtle gradient border around the icon -->
  <rect x="0.75" y="0.75" width="98.5" height="98.5" rx="23.25" stroke="url(#grad)" stroke-width="1.5" stroke-opacity="0.4" />

  <!-- Interlocking Neon Chain Links with Glow -->
  <g filter="url(#glow)">
    <!-- Left Link Loop -->
    <path d="M42 35 H35 C26.7 35 20 41.7 20 50 C20 58.3 26.7 65 35 65 H42" stroke="url(#grad)" stroke-width="7" stroke-linecap="round" />
    
    <!-- Right Link Loop -->
    <path d="M58 35 H65 C73.3 35 80 41.7 80 50 C80 58.3 73.3 65 65 65 H58" stroke="url(#grad)" stroke-width="7" stroke-linecap="round" />
    
    <!-- Middle interlocking bridge connector -->
    <path d="M40 50 H60" stroke="url(#grad)" stroke-width="7" stroke-linecap="round" />
  </g>
</svg>